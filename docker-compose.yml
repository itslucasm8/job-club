services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobclub
      POSTGRES_USER: jobclub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    # No ports exposed — app connects via Docker internal network (db:5432)
    # For local dev, uncomment the next line to access Prisma Studio etc:
    # ports:
    #   - '5432:5432'

  app:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://jobclub:${POSTGRES_PASSWORD}@db:5432/jobclub
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
    env_file:
      - .env.production

volumes:
  pg-data:
