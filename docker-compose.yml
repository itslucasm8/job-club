services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobclub
      POSTGRES_USER: jobclub
    env_file:
      - .env.production
    volumes:
      - pg-data:/var/lib/postgresql/data
    # No ports exposed — app connects via Docker internal network (db:5432)
    # For local dev, uncomment the next line to access Prisma Studio etc:
    # ports:
    #   - '5432:5432'

  app:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - db
    env_file:
      - .env.production

volumes:
  pg-data:
