services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobclub
      POSTGRES_USER: jobclub
    env_file:
      - .env.production
    volumes:
      - pg-data:/var/lib/postgresql/data
    # No ports exposed — app connects via Docker internal network (db:5432)
    # For local dev, uncomment the next line to access Prisma Studio etc:
    # ports:
    #   - '5432:5432'

  app:
    build:
      context: .
      args:
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}
    restart: unless-stopped
    ports:
      - '3030:3000'
    depends_on:
      - db
      - scraper
    env_file:
      - .env.production
    extra_hosts:
      # Lets the container reach the host (where the Claude proxy runs on :8090)
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  scraper:
    build:
      context: ./services/scrapling-scraper
    restart: unless-stopped
    env_file:
      - .env.production
    # No port exposure — only the app container needs to reach this,
    # via the compose network at http://scraper:8091.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Playwright base image is ~1.5GB; first cold start under load can take
      # 60s+ before uvicorn binds. Generous start_period avoids false-failures.
      start_period: 60s

volumes:
  pg-data:
