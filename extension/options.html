<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Job Club — Options</title>
  <style>
    body {
      max-width: 420px;
      margin: 32px auto;
      padding: 0 20px;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #1c1917;
    }
    h1 { color: #6b21a8; margin: 0 0 4px; font-size: 20px; }
    .sub { color: #78716c; font-size: 13px; margin-bottom: 24px; }
    label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: #57534e; margin: 16px 0 6px; letter-spacing: 0.04em; }
    input {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #d6d3d1;
      border-radius: 6px;
      box-sizing: border-box;
      font-family: inherit;
    }
    input:focus { outline: none; border-color: #6b21a8; }
    button {
      margin-top: 20px;
      padding: 10px 16px;
      background: #6b21a8;
      color: white;
      border: 0;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #581c87; }
    .help { font-size: 12px; color: #78716c; margin-top: 4px; }
    .msg {
      margin-top: 16px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .msg.ok  { display: block; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .msg.err { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .stored {
      margin-top: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      color: #57534e;
      background: #f5f5f4;
      padding: 6px 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Job Club — Importer</h1>
  <div class="sub">Configuration du backend.</div>

  <label for="apiUrl">URL du backend</label>
  <input type="url" id="apiUrl" placeholder="https://thejobclub.com.au">
  <div class="help">L'extension POST sur <code>/api/extension/import-candidate</code> sous cette URL.</div>

  <label for="secret">Secret</label>
  <input type="text" id="secret" placeholder="…">
  <div class="help">Le même que <code>EXTENSION_SECRET</code> côté serveur. Ne jamais partager.</div>

  <button id="save">Enregistrer</button>
  <div class="msg" id="msg"></div>
  <div class="stored" id="stored"></div>

  <script>
    const $ = (id) => document.getElementById(id)

    function showMsg(kind, text) {
      const el = $('msg')
      el.className = `msg ${kind}`
      el.textContent = text
    }

    async function load() {
      const cfg = await chrome.storage.local.get(['apiUrl', 'secret'])
      $('apiUrl').value = cfg.apiUrl || 'https://thejobclub.com.au'
      $('secret').value = cfg.secret || ''
      refreshStored()
    }

    async function refreshStored() {
      const cfg = await chrome.storage.local.get(['apiUrl', 'secret'])
      const masked = cfg.secret ? cfg.secret.slice(0, 6) + '…' + cfg.secret.slice(-4) : '(vide)'
      $('stored').textContent = `Stocké → URL: ${cfg.apiUrl || '(vide)'} · secret: ${masked}`
    }

    async function save() {
      const apiUrl = $('apiUrl').value.trim()
      const secret = $('secret').value.trim()
      if (!apiUrl) {
        showMsg('err', 'URL manquante')
        return
      }
      if (!secret) {
        showMsg('err', 'Secret manquant')
        return
      }
      try {
        await chrome.storage.local.set({ apiUrl, secret })
        // Verify it actually wrote
        const verify = await chrome.storage.local.get(['apiUrl', 'secret'])
        if (verify.apiUrl === apiUrl && verify.secret === secret) {
          showMsg('ok', '✓ Enregistré dans le stockage local')
        } else {
          showMsg('err', `Enregistrement incomplet — relue: ${JSON.stringify(verify).slice(0, 200)}`)
        }
        await refreshStored()
      } catch (e) {
        showMsg('err', `Erreur: ${e?.message || e}`)
      }
    }

    $('save').addEventListener('click', save)
    load()
  </script>
</body>
</html>
