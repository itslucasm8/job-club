<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Job Club</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      width: 340px;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #1c1917;
      background: #fafaf9;
    }
    header {
      padding: 12px 14px 8px;
      border-bottom: 1px solid #e7e5e4;
    }
    h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 800;
      color: #6b21a8;
    }
    .sub { font-size: 11px; color: #78716c; margin-top: 2px; }
    main { padding: 12px 14px; }
    .row { margin-bottom: 8px; }
    .label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: #57534e; margin-bottom: 2px; letter-spacing: 0.04em; }
    .url {
      font-size: 11px;
      color: #44403c;
      background: white;
      border: 1px solid #e7e5e4;
      border-radius: 6px;
      padding: 6px 8px;
      word-break: break-all;
      max-height: 56px;
      overflow-y: auto;
    }
    .stat {
      display: inline-block;
      font-size: 10px;
      color: #78716c;
      background: #f5f5f4;
      border-radius: 4px;
      padding: 2px 6px;
      margin-right: 4px;
    }
    button.primary {
      width: 100%;
      padding: 10px 12px;
      background: #6b21a8;
      color: white;
      border: 0;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 120ms;
    }
    button.primary:hover { background: #581c87; }
    button.primary:disabled { background: #a8a29e; cursor: not-allowed; }
    .msg {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.4;
      display: none;
    }
    .msg.ok    { display: block; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .msg.err   { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .msg.warn  { display: block; background: #fffbeb; color: #854d0e; border: 1px solid #fde68a; }
    .setup-link {
      display: block;
      margin-top: 10px;
      font-size: 11px;
      color: #6b21a8;
      text-decoration: underline;
      text-align: center;
    }
    .needs-setup {
      padding: 16px;
      text-align: center;
    }
    .needs-setup p { margin: 0 0 12px; color: #44403c; }
  </style>
</head>
<body>
  <header>
    <h1>Job Club — Importer</h1>
    <div class="sub" id="sub">Envoyer cette page au backend pour extraction IA</div>
  </header>

  <div id="needs-setup" class="needs-setup" style="display:none">
    <p><strong>Configuration requise.</strong><br>Définis l'URL et le secret du backend.</p>
    <button id="open-options" class="primary">Ouvrir les options</button>
  </div>

  <main id="main" style="display:none">
    <div class="row">
      <div class="label">URL de la page</div>
      <div class="url" id="url">—</div>
    </div>
    <div class="row">
      <span class="stat" id="char-count">0 caractères</span>
      <span class="stat" id="domain">—</span>
    </div>
    <button id="send" class="primary">Envoyer à Job Club</button>
    <div id="msg" class="msg"></div>
    <a class="setup-link" href="#" id="reopen-options">Modifier la configuration</a>
  </main>

  <script src="popup.js"></script>
</body>
</html>
