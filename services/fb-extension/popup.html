<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Job Club FB Scraper</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 320px;
      margin: 0;
      padding: 12px;
      font-size: 12px;
      color: #1c1917;
      background: #fafaf9;
    }
    h1 { font-size: 13px; margin: 0 0 8px; font-weight: 700; }
    .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #e7e5e4; }
    .row:last-child { border-bottom: none; }
    .label { color: #57534e; }
    .value { font-weight: 600; }
    .ok { color: #15803d; }
    .err { color: #b91c1c; }
    .warn { color: #b45309; }
    button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      background: #1c1917;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover:not(:disabled) { background: #292524; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .links { margin-top: 8px; font-size: 11px; }
    .links a { color: #6b21a8; text-decoration: none; margin-right: 8px; }
    .links a:hover { text-decoration: underline; }
    pre {
      background: #f5f5f4;
      padding: 6px;
      border-radius: 4px;
      font-size: 10px;
      max-height: 80px;
      overflow-y: auto;
      margin: 6px 0 0;
    }
  </style>
</head>
<body>
  <h1>🔵 Job Club — FB Scraper</h1>

  <div class="row">
    <span class="label">Connecté à FB</span>
    <span class="value" id="fb-status">…</span>
  </div>
  <div class="row">
    <span class="label">Token</span>
    <span class="value" id="token-status">…</span>
  </div>
  <div class="row">
    <span class="label">Dernier run</span>
    <span class="value" id="last-run">—</span>
  </div>
  <div class="row">
    <span class="label">Posts capturés</span>
    <span class="value" id="last-posts">—</span>
  </div>

  <button id="run-btn">▶ Run now</button>

  <pre id="status-detail" style="display:none;"></pre>

  <div class="links">
    <a href="#" id="open-options">⚙ Options</a>
    <a href="#" id="open-admin">📊 Admin</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
